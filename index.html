<!DOCTYPE html>
<html>
<head>
    <title>IndusMind AI - Live Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-10">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-4xl font-bold text-blue-500 mb-4">IndusMind AI</h1>
        <p class="mb-6 text-slate-400">Industrial Knowledge Intelligence Platform</p>
        
        <input id="key" type="password" placeholder="Paste Gemini Key Here" class="w-full p-3 bg-slate-800 rounded border border-slate-700 mb-4">
        <textarea id="query" placeholder="Ask about Pump P-101 or Maintenance History..." class="w-full p-3 bg-slate-800 rounded border border-slate-700 h-32 mb-4"></textarea>
        
        <button onclick="askAI()" class="bg-blue-600 px-6 py-2 rounded font-bold w-full hover:bg-blue-700">Analyze Intelligence</button>
        
        <div id="result" class="mt-8 p-6 bg-slate-800 rounded hidden border-l-4 border-blue-500">
            <h3 class="text-xs uppercase text-slate-500 mb-2">AI Analysis</h3>
            <p id="responseText" class="text-lg"></p>
        </div>
    </div>

    <script>
        async function askAI() {
            const key = document.getElementById('key').value;
            const query = document.getElementById('query').value;
            const resDiv = document.getElementById('result');
            const resText = document.getElementById('responseText');

            if(!key) return alert("Please enter your API Key");

            resText.innerText = "Processing Industrial Data...";
            resDiv.classList.remove('hidden');

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: query }] }] })
            });

            const data = await response.json();
            resText.innerText = data.candidates[0].content.parts[0].text;
        }
    </script>
</body>
</html>
