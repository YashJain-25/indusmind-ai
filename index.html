<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeMind AI | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.cdnfonts.com/css/segoe-ui-4" rel="stylesheet">
    <style>
        :root { --ms-blue: #0078d4; --mica: rgba(255, 255, 255, 0.8); }
        body { font-family: 'Segoe UI', sans-serif; background: #f3f2f1; color: #323130; overflow: hidden; }
        .mica { background: var(--mica); backdrop-filter: blur(20px); border: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- NAV BAR -->
    <header class="h-12 bg-[#001015] text-white flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-4">
            <i class="fas fa-th text-gray-400"></i>
            <h1 class="text-xs font-bold tracking-widest text-blue-400">FORGEMIND <span class="text-white font-light">ADOBE-INTEL</span></h1>
        </div>
        <div class="flex items-center gap-2 text-[10px] font-bold text-green-400">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> ADOBE NODE ACTIVE
        </div>
    </header>

    <div class="flex-grow flex overflow-hidden">
        <!-- SIDEBAR -->
        <nav class="w-64 bg-[#f3f2f1] border-r border-gray-200 p-4 space-y-2">
            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-4">Industrial Agents</p>
            <div class="bg-white border-l-4 border-blue-600 px-3 py-2 text-xs font-bold text-blue-700 shadow-sm">Command Center</div>
            <div class="px-3 py-2 text-xs text-gray-600 hover:bg-gray-200 rounded cursor-pointer">Digital Twin</div>
        </nav>

        <!-- MAIN CHAT -->
        <main class="flex-grow flex flex-col bg-white">
            <div id="chatBox" class="flex-grow overflow-y-auto p-10 space-y-8 bg-[#faf9f8]">
                <!-- AI Message -->
                <div class="flex gap-4 max-w-4xl mx-auto">
                    <div class="w-9 h-9 rounded bg-[#FA0F00] flex items-center justify-center flex-shrink-0 shadow-lg">
                        <i class="fas fa-file-pdf text-white text-sm"></i>
                    </div>
                    <div class="space-y-1">
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Atlas Extract™ (Adobe)</p>
                        <div class="mica p-5 rounded-2xl rounded-tl-none text-sm text-gray-700 leading-relaxed shadow-sm border border-gray-100">
                            Adobe Intelligence Node Synchronized. Upload P&IDs or technical PDFs for high-fidelity extraction.
                        </div>
                    </div>
                </div>
            </div>

            <!-- COMPOSER -->
            <div class="p-8 border-t border-gray-200">
                <div class="max-w-4xl mx-auto relative flex items-center bg-white border border-gray-300 rounded-xl shadow-xl p-1 focus-within:border-blue-500 transition">
                    <label class="p-3 text-gray-400 hover:text-red-600 cursor-pointer">
                        <i class="fas fa-paperclip"></i>
                        <input type="file" id="fileInput" class="hidden">
                    </label>
                    <textarea id="userInput" rows="1" placeholder="Inquire about asset RCA or compliance..." class="w-full bg-transparent border-none focus:ring-0 text-sm p-3 outline-none resize-none"></textarea>
                    <button onclick="runAdobeAI()" class="mx-2 px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-xs font-bold transition flex items-center gap-2">
                        <span>Execute</span> <i class="fas fa-bolt"></i>
                    </button>
                </div>
                <div id="status" class="hidden mt-2 text-[10px] text-blue-600 font-bold tracking-widest uppercase text-center animate-pulse">Analyzing via Adobe PDF Extract...</div>
            </div>
        </main>
    </div>

    <script>
        async function runAdobeAI() {
            const query = document.getElementById('userInput').value;
            const chatBox = document.getElementById('chatBox');
            const status = document.getElementById('status');

            if(!query) return;

            chatBox.innerHTML += `<div class="flex justify-end max-w-4xl mx-auto mb-6"><div class="bg-blue-600 text-white p-4 rounded-xl rounded-tr-none text-sm shadow-md max-w-lg">${query}</div></div>`;
            status.classList.remove('hidden');
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/api/main', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });
                const data = await response.json();

                chatBox.innerHTML += `
                    <div class="flex gap-4 max-w-4xl mx-auto mb-8">
                        <div class="w-9 h-9 rounded bg-[#FA0F00] flex items-center justify-center flex-shrink-0 shadow-lg">
                            <i class="fas fa-file-pdf text-white text-sm"></i>
                        </div>
                        <div class="space-y-1">
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${data.agent}</p>
                            <div class="mica p-5 rounded-2xl rounded-tl-none text-sm text-gray-700 leading-relaxed shadow-sm border border-gray-100 whitespace-pre-wrap">${data.message}</div>
                        </div>
                    </div>`;
            } catch (err) {
                chatBox.innerHTML += `<div class="text-red-500 text-center text-xs font-bold uppercase">Sync Error: Adobe Node Unreachable</div>`;
            } finally {
                status.classList.add('hidden');
                document.getElementById('userInput').value = "";
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    </script>
</body>
</html>
