<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndusMind AI | Industrial Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-blue-500">INDUSMIND AI</h1>
                <p class="text-slate-500 text-sm font-medium">Knowledge Graph & Maintenance Intelligence Platform</p>
            </div>
            <div class="flex items-center gap-3">
                <input id="apiKey" type="password" placeholder="Enter API Key">
                <div id="status" class="hidden px-3 py-1 bg-blue-500/10 border border-blue-500 text-blue-500 text-[10px] font-bold rounded animate-pulse uppercase">Processing</div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- LEFT COLUMN: INGESTION -->
            <div class="lg:col-span-4 space-y-6">
                <div class="glass p-6 rounded-2xl">
                    <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-4 flex items-center gap-2">
                        <i class="fas fa-file-import text-blue-500"></i> Document Ingestion
                    </h2>
                    <label class="group block border-2 border-dashed border-slate-700 hover:border-blue-500 rounded-xl p-8 text-center cursor-pointer transition-all">
                        <input type="file" id="fileInput" accept="application/pdf,image/*" class="hidden">
                        <i class="fas fa-cloud-upload-alt text-4xl mb-3 text-slate-600 group-hover:text-blue-500 transition"></i>
                        <p id="fileName" class="text-xs text-slate-500 group-hover:text-slate-300">Upload P&ID, SOP, or Log <br>(PDF/JPG/PNG)</p>
                    </label>
                </div>

                <div class="glass p-6 rounded-2xl">
                    <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-4 flex items-center gap-2">
                        <i class="fas fa-brain text-blue-500"></i> Intelligence Logic
                    </h2>
                    <div class="space-y-3">
                        <button onclick="setPrompt('ocr')" class="w-full text-left p-3 text-xs bg-slate-800/50 hover:bg-blue-600/20 rounded-lg border border-slate-700 transition">Detailed Document OCR</button>
                        <button onclick="setPrompt('twin')" class="w-full text-left p-3 text-xs bg-slate-800/50 hover:bg-blue-600/20 rounded-lg border border-slate-700 transition">Digital Twin Entity Extraction</button>
                        <button onclick="setPrompt('maint')" class="w-full text-left p-3 text-xs bg-slate-800/50 hover:bg-blue-600/20 rounded-lg border border-slate-700 transition">Predictive Maintenance Analysis</button>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: CHAT & DIGITAL TWIN -->
            <div class="lg:col-span-8 space-y-6">
                <div class="glass rounded-2xl flex flex-col h-[600px] overflow-hidden">
                    <div id="chatDisplay" class="flex-grow overflow-y-auto p-6 space-y-6 text-sm">
                        <div class="flex gap-4">
                            <div class="w-8 h-8 rounded bg-blue-600 flex items-center justify-center flex-shrink-0 font-bold text-xs">IM</div>
                            <div class="bg-slate-800/50 p-4 rounded-2xl rounded-tl-none border border-slate-700 max-w-[80%]">
                                <p class="text-slate-300">Ready for Industrial Analysis. Please upload a document and select an intelligence logic.</p>
                            </div>
                        </div>
                    </div>

                    <!-- INPUT AREA -->
                    <div class="p-4 bg-slate-900/50 border-t border-slate-800">
                        <div class="flex gap-4 items-end">
                            <textarea id="userQuery" rows="1" placeholder="Type technical question..." class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 text-sm focus:ring-2 focus:ring-blue-600 outline-none resize-none"></textarea>
                            <button onclick="runAnalysis()" class="h-12 w-12 bg-blue-600 hover:bg-blue-500 rounded-xl flex items-center justify-center transition shadow-lg shadow-blue-900/20">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let fileData = { base64: "", mimeType: "" };

        // Handle File Uploads
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('fileName').innerHTML = `<span class="text-blue-400 font-bold">${file.name}</span><br>Document Ready`;
            fileData.mimeType = file.type;
            const reader = new FileReader();
            reader.onload = (ev) => fileData.base64 = ev.target.result.split(',')[1];
            reader.readAsDataURL(file);
        };

        function setPrompt(type) {
            const queries = {
                ocr: "Perform a high-precision OCR. Extract all Equipment Tags, Specifications, and table data into a structured report.",
                twin: "Extract all entities for a Digital Twin. Identify: Equipment Name, Tag, Parent System, and Criticality.",
                maint: "Analyze the maintenance history in this document. Identify the Root Cause of failures and recommend preventive actions."
            };
            document.getElementById('userQuery').value = queries[type];
        }

        async function runAnalysis() {
            const key = document.getElementById('apiKey').value;
            const query = document.getElementById('userQuery').value;
            const display = document.getElementById('chatDisplay');
            const status = document.getElementById('status');

            if(!key || !query) return alert("Missing API Key or Query");

            // UI: Add User Message
            display.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 p-4 rounded-2xl rounded-tr-none max-w-[80%]">${query}</div></div>`;
            status.classList.remove('hidden');
            display.scrollTop = display.scrollHeight;

            // Prepare Payload for Gemini 1.5 Pro
            const payload = {
                contents: [{
                    parts: [
                        { text: `System: You are IndusMind AI Industrial Expert. Analyze the following request: ${query}` },
                        ...(fileData.base64 ? [{ inline_data: { mime_type: fileData.mimeType, data: fileData.base64 } }] : [])
                    ]
                }]
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${key}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;

                display.innerHTML += `
                    <div class="flex gap-4">
                        <div class="w-8 h-8 rounded bg-blue-600 flex items-center justify-center flex-shrink-0 font-bold text-xs">IM</div>
                        <div class="bg-slate-800/50 p-4 rounded-2xl rounded-tl-none border border-slate-700 max-w-[90%] whitespace-pre-wrap leading-relaxed">${aiText}</div>
                    </div>`;
            } catch (err) {
                display.innerHTML += `<div class="text-red-500 text-xs p-4">Error: Intelligence Engine Timeout. Verify Key.</div>`;
            } finally {
                status.classList.add('hidden');
                document.getElementById('userQuery').value = "";
                display.scrollTop = display.scrollHeight;
            }
        }
    </script>
</body>
</html>
